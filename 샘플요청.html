<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>더제이수 샘플 요청 엑셀 파일 생성기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #f4f1ed;
    --surface: #ffffff;
    --surface2: #f9f7f4;
    --border: #e0dbd3;
    --border2: #ccc8c0;
    --accent: #d45f3c;
    --accent2: #3c7dd4;
    --text: #1e1a16;
    --text-muted: #9a9088;
    --red: #d43c3c;
    --green: #2e9e5b;
    --radius: 14px;
    --shadow: 0 2px 16px rgba(0,0,0,0.08);
    --mono: 'DM Mono', monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 80px;
  }

  .wrap { width: 100%; max-width: 860px; }

  /* 헤더 */
  .header {
    margin-bottom: 32px;
    padding-bottom: 24px;
    border-bottom: 2px solid var(--text);
  }
  .header h1 {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text);
    white-space: nowrap;
    font-family: var(--mono);
  }
  .header h1 span { color: var(--accent); }
  .header p { font-size: 12px; color: var(--text-muted); margin-top: 6px; font-weight: 400; }

  /* 카드 */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
    box-shadow: var(--shadow);
  }

  .section-label {
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: 0.02em;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::before {
    content: '';
    display: inline-block;
    width: 4px; height: 16px;
    background: var(--accent);
    border-radius: 2px;
  }

  textarea {
    width: 100%;
    height: 210px;
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.8;
    padding: 16px 18px;
    resize: vertical;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(212,95,60,0.1); }
  textarea::placeholder { color: #bbb6ae; }

  .btn-row { display: flex; gap: 10px; margin-top: 16px; }

  .btn {
    display: flex; align-items: center; gap: 8px;
    padding: 12px 22px;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 700;
    font-family: var(--mono);
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; flex: 1; justify-content: center; font-size: 14px; }
  .btn-primary:hover { background: #c04e2c; transform: translateY(-1px); box-shadow: 0 6px 18px rgba(212,95,60,0.28); }
  .btn-secondary { background: var(--surface2); color: var(--text-muted); border: 1.5px solid var(--border); }
  .btn-secondary:hover { color: var(--text); border-color: var(--border2); background: #eee9e2; }
  .btn-blue { background: var(--accent2); color: #fff; justify-content: center; }
  .btn-blue:hover { background: #2c6bbf; transform: translateY(-1px); }
  .btn-green { background: var(--green); color: #fff; justify-content: center; }
  .btn-green:hover { background: #238a4a; transform: translateY(-1px); }

  /* 통계 칩 */
  .stats { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .stat-chip {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    color: var(--text-muted);
    background: var(--surface2);
    font-weight: 400;
  }
  .stat-chip.ok { border-color: var(--green); color: var(--green); background: #edfaf3; }
  .stat-chip.warn { border-color: var(--red); color: var(--red); background: #fdf0f0; }

  /* 테이블 */
  .preview-section { display: none; }
  .preview-section.visible { display: block; }

  .table-wrap { overflow-x: auto; border-radius: 10px; border: 1.5px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  thead th {
    background: var(--surface2);
    padding: 11px 14px;
    text-align: left;
    font-size: 10.5px;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    border-bottom: 1.5px solid var(--border);
    white-space: nowrap;
    font-weight: 500;
  }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr.unmatched { background: #fff8f6; }
  tbody tr.miss-filled { background: #f0faf4 !important; }

  td { padding: 9px 14px; vertical-align: middle; }
  td.name-col { max-width: 300px; word-break: keep-all; line-height: 1.5; color: var(--text); }
  td.vendor-col { white-space: nowrap; font-weight: 500; }
  td.vendor-col.miss { color: var(--red); }
  td.phone-col, td.addr-col { font-size: 11.5px; color: var(--text-muted); white-space: nowrap; }

  .badge-miss {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px;
    background: #fdf0f0; color: var(--red);
    border: 1px solid rgba(212,60,60,0.25);
    padding: 2px 7px; border-radius: 4px;
    margin-right: 4px;
  }

  /* 미매칭 입력 인풋 */
  .miss-input {
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 5px 9px;
    font-size: 11.5px;
    font-family: var(--mono);
    background: #fff;
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
    width: 130px;
  }
  .miss-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(212,95,60,0.1); }
  .miss-input::placeholder { color: #ccc; }
  .miss-input.addr-input { width: 160px; }

  /* 안내 박스 */
  .notice-box {
    display: none;
    margin-top: 16px;
    padding: 13px 16px;
    background: #fff8f6;
    border: 1.5px solid rgba(212,60,60,0.2);
    border-radius: 10px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.7;
    font-weight: 400;
  }

  /* 다운로드 버튼 */
  .dl-btn {
    display: flex; align-items: center; gap: 9px;
    padding: 14px 28px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 700;
    font-family: var(--mono);
    cursor: pointer; border: none;
    background: var(--accent2); color: #fff;
    margin-top: 16px; width: 100%;
    justify-content: center;
    transition: all 0.15s;
  }
  .dl-btn:hover { background: #2c6bbf; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(60,125,212,0.28); }

  /* 공유 모달 */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 28px;
    width: 100%; max-width: 500px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    position: relative;
  }
  .modal h2 { font-size: 15px; font-weight: 700; margin-bottom: 4px; color: var(--text); }
  .modal p.sub { font-size: 11.5px; color: var(--text-muted); margin-bottom: 16px; font-weight: 400; }
  .share-box {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
    font-size: 12.5px;
    line-height: 2;
    white-space: pre;
    color: var(--text);
    max-height: 340px;
    overflow-y: auto;
    margin-bottom: 16px;
    font-weight: 400;
  }
  .modal-btns { display: flex; gap: 10px; }
  .modal-close {
    position: absolute; top: 16px; right: 18px;
    background: none; border: none;
    font-size: 18px; cursor: pointer;
    color: var(--text-muted); font-family: var(--mono);
  }
  .modal-close:hover { color: var(--text); }

  /* 토스트 */
  .toast {
    position: fixed; bottom: 30px; left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--text); color: #fff;
    font-size: 13px; font-family: var(--mono);
    padding: 11px 24px; border-radius: 8px;
    opacity: 0; transition: all 0.3s;
    pointer-events: none; z-index: 999;
    white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.18);
    font-weight: 400;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .load-status {
    font-size: 11.5px;
    font-family: var(--mono);
    padding: 5px 12px;
    border-radius: 6px;
    margin-bottom: 14px;
    display: inline-block;
  }
  .btn-sheet-link {
    display: flex; align-items: center; gap: 5px;
    padding: 5px 11px;
    border-radius: 6px;
    font-size: 11.5px; font-weight: 500;
    font-family: var(--mono);
    cursor: pointer; border: 1.5px solid var(--border2);
    background: var(--surface2); color: var(--text-muted);
    transition: all 0.15s;
  }
  .btn-sheet-link:hover { color: var(--accent2); border-color: var(--accent2); background: #f0f5ff; }

  .load-status.loading { background: #f0f4ff; color: var(--accent2); border: 1px solid #c5d8ff; }
  .load-status.ok      { background: #edfaf3; color: var(--green);   border: 1px solid #b6e8cc; }
  .load-status.error   { background: #fdf0f0; color: var(--red);     border: 1px solid #f5c0c0; }

  /* 거래처 업데이트 버튼 */
  .btn-upload {
    display: flex; align-items: center; gap: 8px;
    padding: 11px 20px;
    border-radius: 9px;
    font-size: 13px; font-weight: 700;
    font-family: var(--mono);
    cursor: pointer; border: 1.5px solid var(--green);
    background: var(--surface2); color: var(--green);
    transition: all 0.15s; white-space: nowrap;
  }
  .btn-upload:hover { background: #edfaf3; transform: translateY(-1px); }
  .btn-upload:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
</style>
</head>

<div class="wrap">

          거래처 시트

      </a>
    </div>
    <div class="section-label">신상마켓 찜 목록 붙여넣기</div>

        분석 &amp; 미리보기
      </button>
      <button class="btn btn-secondary" onclick="clearAll()">초기화</button>
    </div>
  </div>

  <div class="card preview-section" id="previewSection">
    <div class="section-label">미리보기</div>
    <div class="stats" id="statsRow"></div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>업체명</th>
            <th>연락처</th>
            <th>주소</th>
            <th>상품명 (내용)</th>
          </tr>
        </thead>
        <tbody id="previewBody"></tbody>
      </table>
    </div>

    <div class="notice-box" id="missingNotice">
      ⬆ <span style="color:var(--red); font-weight:600;">미매칭 업체</span>는 위 표에서 연락처와 주소를 직접 입력하면 엑셀에 반영돼요.<br>
      중복 거래처는 첫 번째 행에만 입력하면 같은 거래처의 모든 상품에 자동 적용됩니다.
    </div>

    <div style="display:flex; gap:10px; margin-top:16px; align-items:flex-start;">
      <div style="flex:1; display:flex; flex-direction:column; gap:5px;">
        <button class="dl-btn" onclick="downloadExcel()" style="margin-top:0; width:100%;">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          엑셀 다운로드 (스마트비즈 업로드용)
        </button>
        <p id="autoSaveNote" style="display:none; font-size:11px; color:var(--text-muted); text-align:center; line-height:1.5;">
          미등록 업체는 자동으로 거래처 LIST 구글 시트에 저장됩니다
        </p>
      </div>
    </div>
    </div>

</div>
  </div>
</div>

<div class="toast" id="toast"></div>

  const el = document.getElementById('loadStatus');
  try {
    el.textContent = '거래처 목록 불러오는 중...';
    el.className = 'load-status loading';
    const res = await fetch(`${GAS_URL}?action=getVendors`);
    const data = await res.json();
    if (data.result === 'ok' && Array.isArray(data.vendors) && data.vendors.length > 0) {
      const builtinNames = new Set(BUILTIN_VENDORS.map(v => v['업체명'].toLowerCase()));
      const sheetOnly = data.vendors.filter(v => !builtinNames.has(v['업체명'].toLowerCase()));
      const sheetMap = {};
      data.vendors.forEach(v => { sheetMap[v['업체명'].toLowerCase()] = v; });
      VENDORS = BUILTIN_VENDORS.map(v => {
        const sv = sheetMap[v['업체명'].toLowerCase()];
        return sv ? { '업체명': v['업체명'], '전화번호': sv['전화번호'] || v['전화번호'], '위치': sv['위치'] || v['위치'] } : v;
      });
      VENDORS = [...VENDORS, ...sheetOnly];
      el.textContent = `✓ 거래처 ${VENDORS.length}개`;
      el.className = 'load-status ok';
      const lnk = document.getElementById('sheetLink'); if(lnk) lnk.style.display = 'inline';
    } else {
      throw new Error('getVendors 미지원');
    }
  } catch(err) {
    VENDORS = [...BUILTIN_VENDORS];
    el.textContent = `✓ 거래처 ${VENDORS.length}개`;
    el.className = 'load-status ok';
    const lnk = document.getElementById('sheetLink'); if(lnk) lnk.style.display = 'inline';
    console.warn('시트 연동 실패, 내장 데이터 사용:', err.message);
  }
}

async function saveVendorToSheet(name, phone, addr) {
  try {
    const payload = encodeURIComponent(JSON.stringify({ name, phone, addr }));
    await fetch(`${GAS_URL}?action=save&data=${payload}`);
  } catch(err) { console.error('저장 실패:', err); }
}



const BRAND_MAP = [
  { pattern: /flutter\(플러터\)/i,          target: '플러터' },
  { pattern: /flutter/i,                   target: '플러터' },
  { pattern: /coolpis\s*쿨피스/i,           target: '쿨피스' },
  { pattern: /쿨피스/i,                     target: '쿨피스' },
  { pattern: /더\s*샌드/i,                  target: '더샌드' },
  { pattern: /the\s*sand/i,                target: '더샌드' },
  { pattern: /르헤베/i,                     target: '르헤베(구.마이영)' },
  { pattern: /leheve/i,                    target: '르헤베(구.마이영)' },
  { pattern: /프레즐/i,                     target: '프레즐' },
  { pattern: /prezel/i,                    target: '프레즐' },
  { pattern: /renouveau/i,                 target: '르누보' },
  { pattern: /르누보/i,                     target: '르누보' },
  { pattern: /ondo\s*온도/i,                target: '온도' },
  { pattern: /maybeen|메이빈/i,             target: '메이빈' },
  { pattern: /inouf|이너프/i,               target: '이너프' },
  { pattern: /로와드/i,                     target: '로와드(구.다올)' },
  { pattern: /sunday\(선데이\)|선데이/i,     target: '선데이' },
  { pattern: /솔트비/i,                     target: '솔트비' },
  { pattern: /salt_b/i,                    target: '솔트비' },
  { pattern: /gratia\s*그라티아|그라티아/i,  target: '그라티아' },
  { pattern: /스랍/i,                       target: '스랍&아하' },
  { pattern: /srap/i,                      target: '스랍&아하' },
  { pattern: /퍼스트런|first\s*run/i,       target: '퍼스트런' },
  { pattern: /라운지베라|lounge\s*vera/i,   target: '라운지베라' },
  { pattern: /모이\(moi\)|모이/i,            target: '모이라이' },
];

function normalizeBrand(raw) {
  for (const rule of BRAND_MAP) {
    if (rule.pattern.test(raw.trim())) return rule.target;
  }
  return raw.trim();
}

function findVendor(brandRaw) {
  const target = normalizeBrand(brandRaw).toLowerCase();
  for (const v of VENDORS) {
    if (v['업체명'].toLowerCase() === target) return v;
  }
  for (const v of VENDORS) {
    const vn = v['업체명'].toLowerCase();
    if (target.includes(vn) || vn.includes(target)) return v;
  }
  return null;
}

function parseInput(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);
  const items = [];
  let i = 0;
  while (i < lines.length) {
    if (i + 1 < lines.length && lines[i+1].includes('/')) {
      const productName = lines[i];
      const vendorRaw = lines[i+1];
      let skip = 2;
      while (i+skip < lines.length && (lines[i+skip].startsWith('₩') || /^\d+$/.test(lines[i+skip]))) skip++;
      const brandPart = vendorRaw.includes('/') ? vendorRaw.split('/').slice(1).join('/').trim() : vendorRaw.trim();
      items.push({ productName, brandPart });
      i += skip;
    } else { i++; }
  }
  return items;
}

let currentResults = [];
let missInputStore = {};

function processData() {
  const text = document.getElementById('inputArea').value.trim();
  if (!text) { showToast('⚠ 목록을 먼저 붙여넣어 주세요'); return; }
  const items = parseInput(text);
  if (!items.length) { showToast('⚠ 파싱된 상품이 없습니다. 형식을 확인해주세요'); return; }

  missInputStore = {};
  currentResults = items.map(item => {
    const v = findVendor(item.brandPart);
    return v
      ? { 업체명: v['업체명'], 연락처: v['전화번호']||'', 주소: v['위치']||'', 내용: item.productName, matched: true, brandKey: null }
      : { 업체명: item.brandPart, 연락처: '', 주소: '', 내용: item.productName, matched: false, brandKey: item.brandPart };
  });

  currentResults.filter(r => !r.matched).forEach(r => {
    if (!missInputStore[r.brandKey]) missInputStore[r.brandKey] = { phone: '', addr: '' };
  });

  currentResults.sort((a,b) => a.matched === b.matched ? 0 : a.matched ? 1 : -1);
  renderPreview();
}

function renderPreview() {
  const tbody = document.getElementById('previewBody');
  tbody.innerHTML = '';

  const unmatched = currentResults.filter(r => !r.matched);
  const matched   = currentResults.filter(r =>  r.matched);

  document.getElementById('statsRow').innerHTML =
    `<span class="stat-chip">총 ${currentResults.length}개</span>` +
    `<span class="stat-chip ok">✓ 매칭 ${matched.length}개</span>` +
    (unmatched.length ? `<span class="stat-chip warn">✗ 미매칭 ${unmatched.length}개</span>` : '');

  const firstRowOfBrand = {};

  for (const r of currentResults) {
    const tr = document.createElement('tr');
    if (!r.matched) {
      tr.classList.add('unmatched');
      tr.dataset.brandKey = r.brandKey;

      const isFirst = !firstRowOfBrand[r.brandKey];
      if (isFirst) firstRowOfBrand[r.brandKey] = true;

      const storedPhone = missInputStore[r.brandKey]?.phone || '';
      const storedAddr  = missInputStore[r.brandKey]?.addr  || '';

      tr.innerHTML = `
        <td class="vendor-col miss">
          <span class="badge-miss">✗ LIST없음</span>${r.업체명}
        </td>
        <td class="phone-col">
          ${isFirst
            ? `<input class="miss-input" type="text" placeholder="연락처 입력" data-brand="${r.brandKey}" data-field="phone" value="${storedPhone}" oninput="syncMissInput(this)" />`
            : `<span class="synced-val" data-brand="${r.brandKey}" data-field="phone">${storedPhone || '—'}</span>`
          }
        </td>
        <td class="addr-col">
          ${isFirst
            ? `<input class="miss-input addr-input" type="text" placeholder="주소 입력" data-brand="${r.brandKey}" data-field="addr" value="${storedAddr}" oninput="syncMissInput(this)" />`
            : `<span class="synced-val" data-brand="${r.brandKey}" data-field="addr">${storedAddr || '—'}</span>`
          }
        </td>
        <td class="name-col">${r.내용}</td>`;
    } else {
      tr.innerHTML = `
        <td class="vendor-col">${r.업체명}</td>
        <td class="phone-col">${r.연락처||'—'}</td>
        <td class="addr-col">${r.주소||'—'}</td>
        <td class="name-col">${r.내용}</td>`;
    }
    tbody.appendChild(tr);
  }

  document.getElementById('missingNotice').style.display = unmatched.length ? 'block' : 'none';
  document.getElementById('previewSection').classList.add('visible');
  document.getElementById('previewSection').scrollIntoView({ behavior:'smooth', block:'start' });
  const noteEl = document.getElementById('autoSaveNote');
  if (noteEl) noteEl.style.display = unmatched.length ? 'block' : 'none';
}

function syncMissInput(input) {
  const brand = input.dataset.brand;
  const field = input.dataset.field;
  const val = input.value;

  missInputStore[brand][field] = val;

  // currentResults 업데이트
  currentResults.forEach(r => {
    if (!r.matched && r.brandKey === brand) {
      if (field === 'phone') r.연락처 = val;
      else r.주소 = val;
    }
  });

  // 같은 거래처 synced-val 스팬 업데이트
  document.querySelectorAll(`.synced-val[data-brand="${brand}"][data-field="${field}"]`).forEach(el => {
    el.textContent = val || '—';
  });

  // 행 배경색 업데이트
  const filled = missInputStore[brand].phone || missInputStore[brand].addr;
  document.querySelectorAll('tr.unmatched').forEach(tr => {
    if (tr.dataset.brandKey === brand) {
      tr.classList.toggle('miss-filled', !!filled);
    }
  });
}


// ── 미등록 거래처 구글 시트 등록 ──
async function uploadMissingVendors() {
  const btn = document.getElementById('uploadVendorBtn');
  const missKeys = Object.keys(missInputStore).filter(k => missInputStore[k].phone || missInputStore[k].addr);
  if (!missKeys.length) { showToast('⚠ 입력된 거래처 정보가 없어요'); return; }
  btn.disabled = true;
  btn.classList.add('loading');
  btn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg> 등록 중... (${missKeys.length}개)`;
  let successCount = 0, failCount = 0;
  for (const key of missKeys) {
    const phone = missInputStore[key].phone || '';
    const addr  = missInputStore[key].addr  || '';
    const r = currentResults.find(r => !r.matched && r.brandKey === key);
    const name = r ? r.업체명 : key;
    try {
      const payload = encodeURIComponent(JSON.stringify({ name, phone, addr }));
      const res = await fetch(`${GAS_URL}?action=save&data=${payload}`);
      const data = await res.json();
      if (data.result === 'ok') successCount++; else failCount++;
    } catch(err) { failCount++; }
  }
  btn.disabled = false;
  btn.classList.remove('loading');
  btn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2v13"/><path d="M5 9l7-7 7 7"/><rect x="3" y="16" width="18" height="6" rx="2"/></svg> 미등록 거래처 구글 시트에 등록`;
  if (failCount === 0) {
    showToast(`✓ ${successCount}개 거래처 시트 등록 완료!`);
    btn.innerHTML = `<svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> 등록 완료 (${successCount}개)`;
    missKeys.forEach(key => {
      const r = currentResults.find(r => !r.matched && r.brandKey === key);
      if (r) VENDORS.push({ '업체명': r.업체명, '전화번호': missInputStore[key].phone||'', '위치': missInputStore[key].addr||'' });
    });
  } else {
    showToast(`⚠ ${successCount}개 성공, ${failCount}개 실패`);
  }
}


// ── 공유 모달 ──
function openShareModal() {
  const missKeys = [];
  currentResults.filter(r => !r.matched).forEach(r => {
    if (!missKeys.includes(r.brandKey)) missKeys.push(r.brandKey);
  });
  if (!missKeys.length) { showToast('미매칭 업체가 없어요'); return; }

  let lines = [];
  lines.push('*** 샘플 요청 거래처 추가해주세요! ***');
  lines.push('');

  missKeys.forEach((key, idx) => {
    const phone = missInputStore[key]?.phone || '';
    const addr  = missInputStore[key]?.addr  || '';
    lines.push(`${idx + 1}. 업체명: ${key}`);
    if (phone) lines.push(`   연락처: ${phone}`);
    if (addr)  lines.push(`   주  소: ${addr}`);
  });

  document.getElementById('shareContent').textContent = lines.join('\n');
  document.getElementById('shareModal').classList.add('open');
}

function closeShareModal() {
  document.getElementById('shareModal').classList.remove('open');
}

function copyShareContent() {
  const text = document.getElementById('shareContent').textContent;
  navigator.clipboard.writeText(text).then(() => {
    showToast('✓ 복사 완료! 관리자에게 붙여넣어 주세요');
    closeShareModal();
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('✓ 복사 완료!');
    closeShareModal();
  });
}

// ── 엑셀 다운로드 ──
function downloadExcel() {
  if (!currentResults.length) { showToast('⚠ 먼저 분석을 실행해주세요'); return; }
  const wb = XLSX.utils.book_new();

  const s1 = [['업체명(필수)','연락처(필수)','주소(필수)','내용(필수)']];
  for (const r of currentResults) s1.push([r.업체명, r.연락처, r.주소, r.내용]);
  const ws1 = XLSX.utils.aoa_to_sheet(s1);
  ws1['!cols'] = [{wch:22},{wch:18},{wch:26},{wch:58}];
  const hStyle = { font:{bold:true,color:{rgb:'FFFFFF'}}, fill:{fgColor:{rgb:'4472C4'}}, alignment:{horizontal:'center'} };
  ['A1','B1','C1','D1'].forEach(ref => { if(ws1[ref]) ws1[ref].s = hStyle; });
  currentResults.forEach((r,i) => {
    if (!r.matched && !r.연락처 && !r.주소) {
      ['A','B','C','D'].forEach(col => {
        const ref = col+(i+2);
        if (!ws1[ref]) ws1[ref] = {v:'',t:'s'};
        ws1[ref].s = { fill:{fgColor:{rgb:'FFE7E7'}} };
      });
    }
  });
  XLSX.utils.book_append_sheet(wb, ws1, '샘플차감 등록양식');

  const s2 = [['상품명','업체명(매칭결과)','연락처','주소','매칭여부']];
  for (const r of currentResults) s2.push([r.내용, r.업체명, r.연락처, r.주소, r.matched?'✓ 매칭':'✗ LIST 없음']);
  const ws2 = XLSX.utils.aoa_to_sheet(s2);
  ws2['!cols'] = [{wch:58},{wch:22},{wch:18},{wch:24},{wch:14}];
  XLSX.utils.book_append_sheet(wb, ws2, '원본 찜목록');

  const d = new Date();
  const ds = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
  // 미매칭 거래처 자동 저장
  const savedKeys = [];
  currentResults.filter(r => !r.matched).forEach(r => {
    if (!savedKeys.includes(r.brandKey)) {
      savedKeys.push(r.brandKey);
      saveVendorToSheet(r.업체명, missInputStore[r.brandKey]?.phone||'', missInputStore[r.brandKey]?.addr||'');
    }
  });
  XLSX.writeFile(wb, `스마트비즈_샘플요청_${ds}.xlsx`);
  if (savedKeys.length) {
    showToast(`✓ 엑셀 다운로드 완료 · 미등록 거래처 ${savedKeys.length}개 시트 저장`);
  } else {
    showToast('✓ 엑셀 다운로드 완료!');
  }
}

function clearAll() {
  document.getElementById('inputArea').value = '';
  document.getElementById('previewSection').classList.remove('visible');
  currentResults = [];
  missInputStore = {};
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

window.addEventListener('DOMContentLoaded', loadVendors);
